name: Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: npm install

      - name: Bootstrap FVTT config for build
        run: node scripts/write-ci-config.js --release

      - name: Build Compendiums
        run: npm run compendiums-build

      - name: Build Module Scripts
        run: npm run build

      - name: Get Version from module.json
        id: get_version_from_manifest
        run: |
          version=$(jq -r .version ./module.json)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=v$version" >> $GITHUB_OUTPUT

      - name: Prepare release manifest and module archive
        run: |
          version="${{ steps.get_version_from_manifest.outputs.version }}"
          repo="${{ github.server_url }}/${{ github.repository }}"
          manifest_url="${repo}/releases/latest/download/module.json"
          download_url="${repo}/releases/download/v${version}/module.zip"

          jq \
            --arg manifest "$manifest_url" \
            --arg download "$download_url" \
            '.manifest = $manifest | .download = $download' \
            ./module.json > ./module-release.json

          staging=$(mktemp -d)
          jq 'del(.manifest, .download)' ./module.json > "$staging/module.json"
          cp LICENSE "$staging/"
          cp -r scripts packs "$staging/"
          (cd "$staging" && zip -r "$GITHUB_WORKSPACE/module.zip" .)

          mv ./module-release.json ./module.json

      - name: Create or Update Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: v${{ steps.get_version_from_manifest.outputs.version }}
          tag: v${{ steps.get_version_from_manifest.outputs.version }}
          artifacts: './module.json, ./module.zip'
          token: ${{ secrets.GITHUB_TOKEN }}
