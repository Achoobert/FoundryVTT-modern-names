name: Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: npm install

      - name: Build Compendiums
        run: npm run compendiums-build

      - name: Build Module Scripts
        run: npm run build

      - name: Get Version from module.json
        id: get_version_from_manifest
        run: |
          version=$(jq -r .version ./module.json)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=v$version" >> $GITHUB_OUTPUT

      - name: Modify Module Manifest With Release-Specific Values
        id: sub_manifest_link_version
        run: |
          manifest_url="${{ github.server_url }}/${{ github.repository }}/releases/latest/download/module.json"
          download_url="${{ github.server_url }}/${{ github.repository }}/releases/download/v${{ steps.get_version_from_manifest.outputs.version }}/module.zip"
          tmp_file=$(mktemp)
          jq \
            --arg manifest "$manifest_url" \
            --arg download "$download_url" \
            '.manifest = $manifest | .download = $download' \
            ./module.json > "$tmp_file"
          mv "$tmp_file" ./module.json

      - name: Create Module Archive
        run: |
          zip \
            --recurse-paths \
            ./module.zip \
            module.json \
            LICENSE \
            scripts/ \
            packs/

      - name: Create or Update Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: v${{ steps.get_version_from_manifest.outputs.version }}
          tag: v${{ steps.get_version_from_manifest.outputs.version }}
          artifacts: './module.json, ./module.zip'
          token: ${{ secrets.GITHUB_TOKEN }}
