name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  actions: write
  contents: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      FOUNDRY_WAIT_MS: '600000'
      FOUNDRY_CACHE_VERSION: '14.364'
      FOUNDRY_CORE_VERSION: '14.364'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: npm ci

      - name: Write CI config
        env:
          FOUNDRY_WORLD: modern-names-test
          FOUNDRY_USERDATA_HOST: ${{ github.workspace }}/foundrydata
        run: node scripts/write-ci-config.js

      - name: Restore Foundry distribution cache
        uses: actions/cache/restore@v6
        id: foundry-cache-restore
        with:
          path: |
            docker/container_cache
            foundrydata/resources
          key: foundry-dist-${{ env.FOUNDRY_CACHE_VERSION }}-${{ hashFiles('docker/docker-compose.yml') }}
          restore-keys: |
            foundry-dist-${{ env.FOUNDRY_CACHE_VERSION }}-

      - name: Log Foundry cache restore
        run: |
          echo "foundry-cache-restore cache-hit=${{ steps.foundry-cache-restore.outputs.cache-hit }}"
          echo "foundry-cache-restore cache-primary-key=${{ steps.foundry-cache-restore.outputs.cache-primary-key }}"

      - name: Restore Quench and Delta Green cache
        uses: actions/cache@v6
        id: e2e-deps-cache
        with:
          path: |
            foundrydata/Data/modules/quench
            foundrydata/Data/systems/deltagreen
          key: e2e-deps-${{ hashFiles('fvtt.config.example.js') }}

      - name: Build compendiums
        run: npm run compendiums-build

      - name: Build module and tests
        run: npm run build && npm run build:tests

      - name: Restore userdata ownership for host (install-quench)
        run: node scripts/chown-foundrydata-for-docker.js --for-host

      - name: Install Quench and test world (pre-Docker)
        run: node scripts/install-quench.js

      - name: Fix userdata ownership for felddy (uid 1000)
        run: node scripts/chown-foundrydata-for-docker.js

      - name: Snapshot Foundry container cache (pre-boot)
        run: node scripts/foundry-cache-snapshot.js

      - name: Start Foundry container
        env:
          FOUNDRY_USERNAME: ${{ secrets.FOUNDRY_USERNAME }}
          FOUNDRY_PASSWORD: ${{ secrets.FOUNDRY_PASSWORD }}
          FOUNDRY_ADMIN_KEY: ${{ secrets.FOUNDRY_ADMIN_KEY }}
        run: docker compose --project-directory docker --env-file .env up -d

      - name: Wait for Foundry (first boot)
        id: wait-first-boot
        run: node scripts/wait-for-foundry.js

      - name: Verify Foundry distribution on disk
        id: verify-foundry
        run: node scripts/verify-foundry-dist-cache.js

      - name: Save Foundry distribution cache
        if: success() && steps.verify-foundry.outcome == 'success'
        uses: actions/cache/save@v6
        with:
          path: |
            docker/container_cache
            foundrydata/resources
          key: ${{ steps.foundry-cache-restore.outputs.cache-primary-key }}

      - name: Record Foundry download / cache stats
        if: always() && steps.wait-first-boot.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          FOUNDRY_GHA_CACHE_HIT: ${{ steps.foundry-cache-restore.outputs.cache-hit }}
        run: node scripts/record-foundry-download.js --sync-badges --commit-badges

      - name: Restore userdata ownership for host (install-quench)
        run: node scripts/chown-foundrydata-for-docker.js --for-host

      - name: Install Quench and test world (post-Docker)
        run: node scripts/install-quench.js

      - name: Fix userdata ownership for felddy (uid 1000)
        run: node scripts/chown-foundrydata-for-docker.js

      - name: Restart Foundry for world module list
        run: node scripts/restart-foundry-container.js

      - name: Wait for Foundry (after restart)
        run: node scripts/wait-for-foundry.js

      - name: Install Cypress binary
        run: npm run cypress:install

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Run Cypress E2E
        run: npm run test:ci:run
        env:
          CYPRESS_CACHE_FOLDER: ~/.cache/Cypress
          FOUNDRY_ADMIN_KEY: ${{ secrets.FOUNDRY_ADMIN_KEY }}
          FOUNDRY_PASSWORD: ${{ secrets.FOUNDRY_PASSWORD }}

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
