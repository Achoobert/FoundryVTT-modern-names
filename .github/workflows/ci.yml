name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  actions: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      FOUNDRY_WAIT_MS: '600000'
      FOUNDRY_CACHE_VERSION: '14.364'
      FOUNDRY_CORE_VERSION: '14.364'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: npm ci

      - name: Run Foundry E2E
        uses: Achoobert/FoundryvttTestEnv@0.0.11
        with:
          foundry_version: '14.364'
          foundry_world: modern-names-test
          test_system_manifest_url: https://github.com/deltagreen-foundryvtt/delta-green-foundry-vtt-system/releases/download/v1.7.0/system.json
          test_module_ids: quench,modern-names,modern-names-tests
          build_script: |
            npm run compendiums-build
            npm run build
            npm run build:tests
            dest=foundrydata/Data/modules/modern-names
            mkdir -p "$dest"
            rsync -a --exclude '.git' build/ "$dest/"
          quench_tests_path: ./tests/build
          foundry_username: ${{ secrets.FOUNDRY_USERNAME }}
          foundry_password: ${{ secrets.FOUNDRY_PASSWORD }}
          foundry_admin_key: ${{ secrets.FOUNDRY_ADMIN_KEY }}
